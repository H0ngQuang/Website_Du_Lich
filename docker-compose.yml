version: '3.8'

services:
  # PHP + Apache application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travela_app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=travella
      - DB_USERNAME=root
      - DB_PASSWORD=root
    networks:
      - travela_network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: travela_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: travella
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - travela_db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travela_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: travela_phpmyadmin
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    networks:
      - travela_network

volumes:
  travela_db_data:
    driver: local

networks:
  travela_network:
    driver: bridge
