apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  labels:
    app: laravel-website
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: laravel-website
  template:
    metadata:
      labels:
        app: laravel-website
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-master
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

      
      containers:
      - name: laravel-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 80
        
        env:
        - name: APP_NAME
          value: {{ .Values.config.appname | quote }}
        - name: APP_ENV
          value: {{ .Values.config.appEnv | quote }}
        - name: APP_KEY
          value: {{ .Values.secret.appKey | quote }}
        - name: APP_DEBUG
          value: {{ .Values.config.appDebug | quote }}
        - name: APP_URL
          value: {{ .Values.config.appUrl | quote }}
        - name: DB_CONNECTION
          value: {{ .Values.config.dbConnection | quote }}
        - name: DB_HOST
          value: {{ .Values.config.dbHost | quote }}
        - name: DB_PORT
          value: {{ .Values.config.dbPort | quote }}
        - name: DB_DATABASE
          value: {{ .Values.config.dbDatabase | quote }}
        - name: DB_USERNAME
          value: {{ .Values.secret.dbUser | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.secret.dbPassword | quote }}
        - name: LOG_CHANNEL
          value: {{ .Values.config.logChannel | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.config.logLevel | quote }}
        
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 5
---
#==========================================
# MySQL StatefulSet (Chuẩn cho Database)
#==========================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  serviceName: mysql-service
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-master
      tolerations:                    # ← Fix lỗi taint master node
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: {{ .Values.secret.dbPassword | quote }}
        - name: MYSQL_DATABASE
          value: {{ .Values.config.dbDatabase | quote }}
        ports:
        - containerPort: 3306
          name: mysql
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:             # ← StatefulSet tự tạo PVC cho mỗi pod
  - metadata:
      name: mysql-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: manual
      resources:
        requests:
          storage: 2Gi
---
#==========================================
# MySQL Service (Headless cho StatefulSet)
#==========================================
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
    name: mysql
